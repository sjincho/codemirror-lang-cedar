name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify committed dist/ is up to date
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::Committed dist/ is stale. Run 'npm run build' and commit dist/."
            git --no-pager diff --stat -- dist
            exit 1
          fi
      - run: npm test
